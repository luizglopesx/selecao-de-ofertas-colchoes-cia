name: Post Instagram - quarta-17jun-post-colchao-d33

on:
  schedule:
    - cron: '0 12 17 6 *'
  workflow_dispatch:

jobs:
  post-feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Post no Instagram (Feed)
        env:
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          IG_PAGE_TOKEN: ${{ secrets.IG_PAGE_TOKEN }}
          CAPTION: |
            Ele não cansa, não falha e entrega resultado toda noite. 🏆
            
            Apresentamos o titular do nosso elenco — o Colchão Casal D33 Castor.
            
            ⚽ Espuma D33 de alta densidade
            ⚽ Suporte ideal para costas e quadril
            ⚽ Durabilidade de temporada em temporada
            
            🛏️ Colchão Casal D33 Castor
            💰 R$ 1.690,00 — 12x de R$ 140,83 sem juros
            🚚 Entrega e montagem grátis*
            
            Enquanto a Seleção entra em campo lá,
            você escala o seu titular aqui. 💛🇧🇷
            
            📲 WhatsApp: (17) 3324-5765
            📞 Telefone: (17) 3325-6039
            📍 Rua 20 Esq. Av. 13, 1110 — Barretos/SP
            
            *Consulte condições.
        run: python3 scripts/post_instagram.py "https://raw.githubusercontent.com/luizglopesx/selecao-de-ofertas-colchoes-cia/main/assets/quarta-17jun-post-colchao-d33.png" POST

  post-story:
    runs-on: ubuntu-latest
    needs: post-feed
    steps:
      - uses: actions/checkout@v4
      - name: Post no Instagram (Story)
        env:
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          IG_PAGE_TOKEN: ${{ secrets.IG_PAGE_TOKEN }}
        run: python3 scripts/post_instagram.py "https://raw.githubusercontent.com/luizglopesx/selecao-de-ofertas-colchoes-cia/main/assets/quarta-17jun-story-colchao-d33.png" STORY
